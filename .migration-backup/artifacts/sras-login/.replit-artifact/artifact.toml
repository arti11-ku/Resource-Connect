kind = "web"
previewPath = "/"
title = "Smart Resource Allocation System"
version = "1.0.0"
id = "artifacts/sras-login"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25124

[services.development]
run = "pnpm --filter @workspace/sras-login run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sras-login", "run", "build" ]
publicDir = "artifacts/sras-login/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25124"
BASE_PATH = "/"
